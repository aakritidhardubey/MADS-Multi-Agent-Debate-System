<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Debate Arena – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Floating background shapes */
        .bg-animation { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
        }
        .shape-1 { width: 400px; height: 400px; background: #6c63ff; top: -100px; left: -100px; animation-delay: 0s; }
        .shape-2 { width: 300px; height: 300px; background: #f093fb; bottom: -80px; right: -80px; animation-delay: 2s; }
        .shape-3 { width: 250px; height: 250px; background: #4facfe; top: 50%; left: 50%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .auth-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #6c63ff, #4facfe);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white;
        }
        .logo-text h1 { font-size: 22px; font-weight: 800; color: white; }
        .logo-text span { font-size: 12px; color: rgba(255,255,255,0.5); }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab {
            flex: 1; padding: 10px;
            text-align: center; cursor: pointer;
            border-radius: 10px;
            font-size: 14px; font-weight: 600;
            color: rgba(255,255,255,0.5);
            transition: all 0.25s;
            border: none; background: transparent;
        }
        .tab.active {
            background: linear-gradient(135deg, #6c63ff, #4facfe);
            color: white;
            box-shadow: 0 4px 15px rgba(108,99,255,0.4);
        }

        /* Forms */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.3); font-size: 14px;
        }
        input {
            width: 100%; padding: 12px 14px 12px 40px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white; font-size: 14px; font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.25); }
        input:focus {
            border-color: rgba(108,99,255,0.6);
            background: rgba(108,99,255,0.1);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }

        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #4facfe);
            border: none; border-radius: 12px;
            color: white; font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 8px;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,99,255,0.4); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            color: #fca5a5; font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center; gap: 8px;
        }
        .error-msg.show { display: flex; }

        .success-msg {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            color: #86efac; font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center; gap: 8px;
        }
        .success-msg.show { display: flex; }

        .spinner { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="auth-card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-balance-scale"></i></div>
            <div class="logo-text">
                <h1>AI Debate Arena</h1>
                <span>Where Ideas Clash & Truth Emerges</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div class="form-panel active" id="loginPanel">
            <div class="error-msg" id="loginError"><i class="fas fa-exclamation-circle"></i><span id="loginErrorText"></span></div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly')" />
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Your password" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly')" />
                </div>
            </div>
            <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>

        <!-- Register Form -->
        <div class="form-panel" id="registerPanel">
            <div class="error-msg" id="registerError"><i class="fas fa-exclamation-circle"></i><span id="registerErrorText"></span></div>
            <div class="success-msg" id="registerSuccess"><i class="fas fa-check-circle"></i><span>Account created! Redirecting...</span></div>
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="e.g. debater99" autocomplete="off" />
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="off" />
                </div>
            </div>
            <div class="form-group">
                <label>Password <span style="color:rgba(255,255,255,0.35);font-size:12px;">(min 6 chars)</span></label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Create a password" autocomplete="new-password" />
                </div>
            </div>
            <button class="btn-submit" id="registerBtn" onclick="handleRegister()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('mads_token')) {
            window.location.href = '/debate';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
            });
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            document.getElementById(id + 'Text').textContent = msg;
            el.classList.add('show');
        }
        function hideError(id) {
            document.getElementById(id).classList.remove('show');
        }

        async function handleLogin() {
            hideError('loginError');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showError('loginError', 'Please fill in all fields'); return; }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Logging in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');
                localStorage.setItem('mads_token', data.token);
                localStorage.setItem('mads_username', data.username);
                window.location.href = '/debate';
            } catch (e) {
                showError('loginError', e.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }

        async function handleRegister() {
            hideError('registerError');
            document.getElementById('registerSuccess').classList.remove('show');
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!username || !email || !password) { showError('registerError', 'Please fill in all fields'); return; }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Creating account...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed');
                localStorage.setItem('mads_token', data.token);
                localStorage.setItem('mads_username', data.username);
                document.getElementById('registerSuccess').classList.add('show');
                setTimeout(() => window.location.href = '/debate', 1200);
            } catch (e) {
                showError('registerError', e.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (document.getElementById('loginPanel').classList.contains('active')) handleLogin();
                else handleRegister();
            }
        });
      // Clear autofilled values on load
  window.addEventListener('load', function() {
    setTimeout(function() {
      ['loginEmail','loginPassword','regUsername','regEmail','regPassword'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = '';
      });
    }, 100);
  });
</script>
</body>
</html>
